<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">Dummies</h1>
    <a routerLink="/dummies/new"
       class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm">
      + Nuevo
    </a>
  </div>

  @if (loading()) {
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
      Cargando...
    </div>
  } @else if (dummies().length === 0) {
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
      No hay dummies. Crea uno nuevo.
    </div>
  } @else {
    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-200">
            <th class="text-left px-4 py-3 font-medium text-gray-700">ID</th>
            <th class="text-left px-4 py-3 font-medium text-gray-700">Nombre</th>
            <th class="text-left px-4 py-3 font-medium text-gray-700">Tipo</th>
            <th class="text-right px-4 py-3 font-medium text-gray-700">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (d of dummies(); track d.id) {
            <tr class="border-b border-gray-100 hover:bg-gray-50">
              <td class="px-4 py-3">{{ d.id }}</td>
              <td class="px-4 py-3">{{ d.name | truncate:40 }}</td>
              <td class="px-4 py-3">
                <span class="px-2 py-1 text-xs rounded bg-gray-100 text-gray-700">{{ d.dummyEnum }}</span>
              </td>
              <td class="px-4 py-3 text-right space-x-2">
                <a [routerLink]="['/dummies', d.id]"
                   class="text-blue-600 hover:underline text-xs">Ver</a>
                <a [routerLink]="['/dummies', d.id, 'edit']"
                   class="text-yellow-600 hover:underline text-xs">Editar</a>
                <button (click)="delete(d.id)"
                        class="text-red-600 hover:underline text-xs">Eliminar</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
