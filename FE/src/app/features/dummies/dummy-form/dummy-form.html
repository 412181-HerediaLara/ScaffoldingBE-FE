<div class="max-w-lg mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a routerLink="/dummies" class="text-gray-500 hover:text-gray-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">
      {{ isEdit() ? 'Editar' : 'Nuevo' }} Dummy
    </h1>
  </div>

  @if (error()) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">
      {{ error() }}
    </div>
  }

  <div class="bg-white rounded-lg shadow p-6">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input type="text" formControlName="name"
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="Nombre del dummy">
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <p class="text-red-500 text-xs mt-1">Nombre requerido (máx 100)</p>
        }
      </div>

      <div class="flex gap-3">
        <button type="submit" [disabled]="form.invalid || loading()"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">
          {{ loading() ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/dummies"
           class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
