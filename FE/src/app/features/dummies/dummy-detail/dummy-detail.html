<div class="max-w-lg mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <a routerLink="/dummies" class="text-gray-500 hover:text-gray-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Detalle Dummy</h1>
  </div>

  @if (loading()) {
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
      Cargando...
    </div>
  } @else if (dummy(); as d) {
    <div class="bg-white rounded-lg shadow p-6 space-y-4">
      <div>
        <p class="text-xs text-gray-500 uppercase">ID</p>
        <p class="text-gray-900 font-medium">{{ d.id }}</p>
      </div>
      <div>
        <p class="text-xs text-gray-500 uppercase">Nombre</p>
        <p class="text-gray-900 font-medium">{{ d.name }}</p>
      </div>
      <div>
        <p class="text-xs text-gray-500 uppercase">Tipo</p>
        <span class="px-2 py-1 text-xs rounded bg-gray-100 text-gray-700">{{ d.dummyEnum }}</span>
      </div>
      <div class="flex gap-3 pt-4">
        <a [routerLink]="['/dummies', d.id, 'edit']"
           class="px-4 py-2 bg-yellow-500 text-white rounded-md hover:bg-yellow-600 text-sm">
          Editar
        </a>
        <a routerLink="/dummies"
           class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 text-sm">
          Volver
        </a>
      </div>
    </div>
  } @else {
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
      Dummy no encontrado
    </div>
  }
</div>
