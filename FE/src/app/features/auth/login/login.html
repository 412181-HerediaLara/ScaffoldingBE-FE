<h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Iniciar Sesión</h2>

@if (error()) {
  <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">
    {{ error() }}
  </div>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input type="email" formControlName="email"
           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
           placeholder="correo@ejemplo.com">
    @if (form.controls.email.touched && form.controls.email.invalid) {
      <p class="text-red-500 text-xs mt-1">Email válido requerido</p>
    }
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
    <input type="password" formControlName="password"
           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
           placeholder="••••••">
    @if (form.controls.password.touched && form.controls.password.invalid) {
      <p class="text-red-500 text-xs mt-1">Mínimo 6 caracteres</p>
    }
  </div>

  <button type="submit" [disabled]="form.invalid"
          class="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
    Ingresar
  </button>
</form>

<p class="text-center text-sm text-gray-600 mt-4">
  ¿No tienes cuenta?
  <a routerLink="/auth/register" class="text-blue-600 hover:underline">Regístrate</a>
</p>
