<div class="space-y-6">
  <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold text-gray-900">Bienvenido</h2>
      <p class="text-gray-600 mt-2">{{ auth.email() }}</p>
      <span class="inline-block mt-2 px-2 py-1 text-xs font-medium rounded bg-blue-100 text-blue-800">
        {{ auth.role() | roleLabel }}
      </span>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold text-gray-900">Dummies</h2>
      <p class="text-gray-600 mt-2">Gestiona entidades dummy</p>
      <a routerLink="/dummies" class="inline-block mt-4 text-blue-600 hover:underline">Ir a Dummies →</a>
    </div>

    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold text-gray-900">Estado</h2>
      <p class="text-gray-600 mt-2">Sistema operativo</p>
      <span class="inline-block mt-2 px-2 py-1 text-xs font-medium rounded bg-green-100 text-green-800">
        Conectado
      </span>
    </div>
  </div>
</div>
